<div class="form-auth-container">
  <fieldset [disabled]="loading()">
    <form [formGroup]="formAuth">
      <ui-input
        formControlName="email"
        label="Correo electronico"
        type="email"
      />
      <ui-input
        formControlName="password"
        label="Contrasena"
        type="password"
      />
      <app-button
        size="lg"
        icon="fa-solid fa-right-to-bracket"
        iconPosition="right"
        [loading]="loading()"
        (click)="login()"
      >
        Acceder
      </app-button>
    </form>
  </fieldset>
</div>
