<section>
  <div class="section-header alerts" >
    <h4>ALERTAS</h4>
    <app-button (click)="onAdd()" variant="outline" icon="fa-solid fa-plus">Agregar</app-button>
  </div>
  <div class="section-body alerts">
    @for (alert of alerts(); track $index) {
      <app-alert-cards
        [title]="alert.title"
        [description]="alert.description"
        [severity]="alert.severity"
        [count]="alert.count"
        (click)="alert.onClick()"
      />
    }
  </div>
</section>

<section>
  <div class="section-header quick-access" >
    <h4>ACCESO RAPIDO</h4>
    <!-- <span class="config-quick-access">
      <i class="fa-solid fa-gear"></i>
    </span> -->
  </div>
  <div class="section-body quick-access" >
    @for (tag of tags(); track $index) {
      <span class="tag" >
        <i [class]="['fa-solid', tag.icon]" ></i>
        {{tag.label}}
      </span>
    }
  </div>
</section>

<section>
  <div class="section-header" >
    <h4>RECIENTES</h4>
  </div>
  <div class="section-body recents" >
    <app-task-list [tasks]="recentsTasks()"/>
    <app-button variant="outline" (click)="viewTasks()" >Ver todos los reportes</app-button>
  </div>
</section>
