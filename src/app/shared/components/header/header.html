<header class="app-header">
  <div class="header-container">

    <!-- Brand / User -->
    <div class="brand">
      <span class="avatar">{{ initials() }}</span>

      <div class="brand-text">
        <span class="user-name">{{ userName() }}</span>
        <span class="user-role">{{ userRole() }}</span>
      </div>
    </div>

    <!-- Navigation (desktop only) -->
    <nav class="nav">

      <a
        class="nav-item"
        routerLink="/"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <i class="fa-solid fa-house"></i>
        <span>Inicio</span>
      </a>

      <a
        class="nav-item"
        routerLink="/task-list"
        routerLinkActive="active"
      >
        <i class="fa-solid fa-chart-line"></i>
        <span>Reportes</span>
      </a>

      @if (userRole() === 'ADMIN') {
        <a
          class="nav-item"
          routerLink="/admin"
          routerLinkActive="active"
        >
          <i class="fa-solid fa-user-gear"></i>
          <span>Administración</span>
        </a>
      }

    </nav>

    <!-- CTA + Settings -->
    <div class="header-actions">
      <button class="add-btn" (click)="onAdd()">
        <i class="fa-solid fa-plus"></i>
        <span class="btn-text">Nuevo Reporte</span>
      </button>

      <div class="settings-wrapper">
        <button class="settings-btn" (click)="toggleSettingsMenu($event)">
          <i class="fa-solid fa-gear"></i>
        </button>

        @if (showSettingsMenu()) {
          <div class="settings-dropdown" (click)="$event.stopPropagation()">
            <div class="settings-header">
              <span class="settings-title">Sistema</span>
            </div>
            <div class="settings-item version-item">
              <i class="fa-solid fa-code-branch"></i>
              <span>Version {{ appVersion }}</span>
            </div>
            <div class="settings-divider"></div>
            <button class="settings-item logout-item" (click)="onLogout()">
              <i class="fa-solid fa-right-from-bracket"></i>
              <span>Cerrar Sesion</span>
            </button>
          </div>
        }
      </div>
    </div>

  </div>

  <!-- Bottom Navigation (mobile and tablet only) -->
  <nav class="bottom-nav">
    <a
      class="bottom-nav-item"
      routerLink="/"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <i class="fa-solid fa-house"></i>
      <span>Inicio</span>
    </a>

    <a
      class="bottom-nav-item"
      routerLink="/task-list"
      routerLinkActive="active"
    >
      <i class="fa-solid fa-chart-line"></i>
      <span>Reportes</span>
    </a>

    <button class="bottom-nav-center" (click)="onAdd()">
      <i class="fa-solid fa-plus"></i>
      <span>Nuevo</span>
    </button>

    <!-- <a
      class="bottom-nav-item"
      routerLink="/task-list"
      routerLinkActive="active"
    >
      <i class="fa-solid fa-list-check"></i>
      <span>Tareas</span>
    </a> -->

    @if (userRole() === 'ADMIN') {
      <a
        class="bottom-nav-item"
        routerLink="/admin"
        routerLinkActive="active"
      >
        <i class="fa-solid fa-user-gear"></i>
        <span>Admin</span>
      </a>
    }
  </nav>
</header>
